name: Release

on:
  push:
    branches:
      - main

env:
  TURBO_REMOTE_ONLY: 'true'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release # Must be kept for trusted publishing on PyPI
    permissions:
      actions: write
      contents: write
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Necessary for the publish step to work since it uses HEAD^ to determine if the version has changed
          fetch-depth: 2

      - name: Fetch git tags
        run: git fetch origin 'refs/tags/*:refs/tags/*'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install npm@11
        run: npm i -g npm@11

      - name: install pnpm@10.29.3
        run: npm i -g pnpm@10.29.3

      - name: Install Dependencies
        run: pnpm install 

      - name: Build Packages
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm ci:publish # npm publish
          commitMode: 'github-api' # allows release commits and tags to be signed using $GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

